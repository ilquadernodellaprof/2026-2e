- materia: Italiano
  scadenza: mercoledì 29 aprile
  testo: Su un foglio a4 fare lo schema a 5 dita sulla struttura dell'ultimo capitolo letto di Quando Hitler rubò il coniglio rosa (le assenti di venerdì scorso possono farlo sull'ultimo capitolo che ricordano). Sotto allo schema scrivere anche una breve connessione tra il capitolo e il tuo mondo (può essere un collegamento tra la storia e il tuo vissuto o i tuoi pensieri, o tra la storia e altre storie, o tra diverse parti della storia).
